name: CI

on:
  pull_request:
    branches: [main, next]
  push:
    branches: [main, next]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run lint

      - run: bun run dev:prepare

      - run: bun run test
