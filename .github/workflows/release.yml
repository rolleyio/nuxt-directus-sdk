name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (auto-detect from commits, or select manually)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      version:
        description: Exact version override (e.g. 0.1.0) — takes priority over bump
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and test
        run: |
          bun run build
          bun run test

      - name: Configure git
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Run changelogen
        run: bunx changelogen --release --no-github ${{ inputs.bump != 'auto' && format('--{0}', inputs.bump) || '' }}
        env:
          LEFTHOOK: '0'

      - name: Override version
        if: inputs.version != ''
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TARGET="${{ inputs.version }}"

          # Update package.json version
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.version = '${TARGET}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update changelog heading and compare link
          sed -i "s/## v${CURRENT}/## v${TARGET}/" CHANGELOG.md
          sed -i "s/v${CURRENT}/v${TARGET}/g" CHANGELOG.md

          # Replace changelogen's commit and tag with the correct version
          git tag -d "v${CURRENT}" 2>/dev/null || true
          git add package.json CHANGELOG.md
          git commit --amend -m "chore(release): v${TARGET}"
          git tag -a "v${TARGET}" -m "v${TARGET}"
        env:
          LEFTHOOK: '0'

      - name: Push release
        run: git push --follow-tags

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
