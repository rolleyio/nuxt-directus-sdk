name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: bun install

      - run: bun run lint

      - run: bun run dev:prepare

      - run: bun run test

      - run: bun run prepack

      - name: Determine npm tag
        id: npm-tag
        run: |
          # Check if the tag is on the next branch
          if git branch -r --contains ${{ github.ref }} | grep -q 'origin/next'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}

      - name: Generate changelog
        run: |
          bunx changelogen --output CHANGELOG.md
          cp CHANGELOG.md docs/changelog.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md docs/changelog.md
          git diff --staged --quiet || git commit -m "docs: update changelog for ${{ github.ref_name }}"
          git push origin HEAD:next

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --notes-file CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
